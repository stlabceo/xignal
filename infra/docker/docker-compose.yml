services:
  mysql:
    image: mysql:8.4
    container_name: xignal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: xignal
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    

  redis:
    image: redis:7.4
    container_name: xignal-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
