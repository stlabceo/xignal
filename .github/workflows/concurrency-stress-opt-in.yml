name: Concurrency Stress Opt-In

# This workflow is retained as an archived reference only.
# The deleted apps/* workspace was an early rebuild scaffold and is not part of
# the current release boundary. Do not restore apps/* to make this workflow run.

on:
  workflow_dispatch:
    inputs:
      port:
        description: Temporary backend port. Use a dedicated port that is not already occupied.
        required: false
        default: "3003"
      same_runs:
        description: same-dedupe iteration count
        required: false
        default: "4"
      same_parallelism:
        description: same-dedupe parallelism
        required: false
        default: "4"
      race_runs:
        description: resolve-race iteration count
        required: false
        default: "4"
      race_parallelism:
        description: resolve-race parallelism
        required: false
        default: "2"

jobs:
  archived-reference:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Explain archived status
        run: |
          {
            echo "## Archived workflow"
            echo ""
            echo "The apps/* rebuild scaffold has been excluded from the release boundary."
            echo "This workflow intentionally performs no build, DB, or runtime action."
          } >> "$GITHUB_STEP_SUMMARY"
